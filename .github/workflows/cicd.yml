name: Fraud Detection CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      trigger_reason:
        description: "Why triggered (drift/recall/manual)"
        required: false
        default: "manual"

jobs:
  # ── Stage 1: CI ──────────────────────────────────────
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install flake8 pytest

      - name: Lint
        run: flake8 src/ --max-line-length=120 --ignore=E501,W503

      - name: Unit tests
        run: pytest tests/ -v

  # ── Stage 2: Build & Package ─────────────────────────
  build-docker:
    name: Build & Push Docker
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t fraud-api:${{ github.sha }} .

      - name: Tag latest
        run: docker tag fraud-api:${{ github.sha }} fraud-api:latest

      # Push to registry (enable when you have credentials)
      # - name: Push to registry
      #   run: |
      #     echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
      #     docker push fraud-api:latest

  # ── Stage 3: Deploy ───────────────────────────────────
  deploy:
    name: Deploy Model
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install MLflow
        run: pip install mlflow

      - name: Conditional deploy
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: python src/pipeline/06_deploy.py

  # ── Stage 4: Intelligent Retrain Trigger ─────────────
  retrain-on-drift:
    name: Retrain on Drift / Recall Drop
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run retraining pipeline
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: |
          echo "Triggered by: ${{ github.event.inputs.trigger_reason }}"
          python src/pipeline/08_retrain.py 0.35
